spring.application.name=flow-desk

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowdesk}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

app.jwt.secret=${JWT_SECRET:c3VwZXItc2VjdXJlLXNpZ25pbmcta2V5LXRvLWJlLXJlcGxhY2VkLWJ5LWVudi12YXI=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.storage.path=${STORAGE_PATH:uploads}
