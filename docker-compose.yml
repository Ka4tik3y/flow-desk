version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: flowdesk-postgres
    environment:
      POSTGRES_DB: flowdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: flowdesk-app
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flowdesk
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: c3VwZXItc2VjdXJlLXNpZ25pbmcta2V5LXRvLWJlLXJlcGxhY2VkLWJ5LWVudi12YXI=
      STORAGE_PATH: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
